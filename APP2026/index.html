<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>iPhone 预览框架 · 375 × 812</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #f4f5f7;
    --frame-bg: #000;
    --shadow: 0 30px 80px rgba(0, 0, 0, 0.18), 0 8px 24px rgba(0, 0, 0, 0.08);
    --accent: #007aff;
    --sidebar-bg: #0f0f10;
    --sidebar-fg: #e5e5e7;
    --sidebar-muted: #8e8e93;
    --sidebar-hover: #1c1c1e;
    --sidebar-active: #2c2c2e;
    --sidebar-border: #1f1f22;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: #1d1d1f;
  }

  .layout {
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--sidebar-bg);
    color: var(--sidebar-fg);
    border-right: 1px solid var(--sidebar-border);
    padding: 16px 8px;
    overflow-y: auto;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px 12px;
    color: var(--sidebar-fg);
    font-size: 14px;
    font-weight: 600;
  }

  .sidebar-header .add {
    color: var(--sidebar-muted);
    font-size: 18px;
    cursor: pointer;
    user-select: none;
  }

  .nav { list-style: none; padding: 0; margin: 0; }
  .nav li { margin: 1px 0; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 8px;
    color: var(--sidebar-fg);
    font-size: 14px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s ease;
    line-height: 1.2;
  }

  .nav-item.folder-row {
    color: var(--sidebar-muted);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding-top: 14px;
  }

  .nav-item:hover { background: var(--sidebar-hover); }
  .nav-item.folder-row:hover { background: transparent; }

  .nav-item.active {
    background: var(--accent);
    color: #fff;
  }
  .nav-item.active .icon,
  .nav-item.active .caret { color: rgba(255,255,255,0.7); }

  .nav-item.disabled { color: var(--sidebar-muted); cursor: not-allowed; }
  .nav-item.disabled:hover { background: transparent; }

  .nav-item .icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--sidebar-muted);
  }

  .nav-item .caret {
    width: 12px;
    height: 12px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--sidebar-muted);
    transition: transform 0.15s ease;
  }

  .nav-item.collapsed .caret { transform: rotate(-90deg); }

  .nav-children {
    list-style: none;
    margin: 0;
    padding: 0 0 0 24px;
    overflow: hidden;
  }

  .nav-item.collapsed + .nav-children { display: none; }

  /* Main */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
    gap: 24px;
    min-width: 0;
  }


  .stage {
    flex: 1;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    width: 100%;
    gap: 40px;
  }

  .page-info {
    width: 240px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-self: center;
  }

  .page-info-header {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .refresh-btn {
    width: 26px;
    height: 26px;
    flex-shrink: 0;
    border: none;
    background: #e5e5ea;
    border-radius: 6px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #6e6e73;
    transition: background 0.15s, transform 0.3s;
    padding: 0;
  }

  .refresh-btn:hover { background: #d1d1d6; color: #1d1d1f; }
  .refresh-btn.spinning svg { animation: spin 0.5s linear; }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .page-info-title {
    font-size: 15px;
    font-weight: 600;
    color: #1d1d1f;
  }

  .page-info-desc {
    font-size: 13px;
    color: #6e6e73;
    line-height: 1.7;
  }

  .page-info-desc p { margin: 0 0 8px; }
  .page-info-desc p:last-child { margin-bottom: 0; }
  .page-info-desc ul, .page-info-desc ol { margin: 0 0 8px; padding-left: 18px; }
  .page-info-desc li { margin-bottom: 3px; }
  .page-info-desc strong { color: #1d1d1f; font-weight: 600; }
  .page-info-desc h3 { font-size: 13px; font-weight: 600; color: #1d1d1f; margin: 10px 0 4px; }
  .page-info-desc code { background: #f0f0f3; border-radius: 4px; padding: 1px 5px; font-size: 12px; }
  .page-info-desc hr { border: none; border-top: 1px solid #e5e5ea; margin: 10px 0; }

  .device {
    background: var(--frame-bg);
    border-radius: 48px;
    padding: 12px;
    box-shadow: var(--shadow);
    position: relative;
    flex-shrink: 0;
  }

  .screen {
    width: 375px;
    height: 812px;
    border-radius: 36px;
    overflow: hidden;
    background: #fff;
    position: relative;
  }

  .screen iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #8e8e93;
    font-size: 14px;
    text-align: center;
    padding: 24px;
  }

  .placeholder strong { color: #1d1d1f; font-size: 16px; }

  @media (max-width: 1080px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; height: auto; position: static; }
  }
</style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span>Pages</span>
        <span class="add" title="新增">+</span>
      </div>
      <ul class="nav" id="nav"></ul>
    </aside>

    <main class="main">
      <div class="stage">
        <div class="device" aria-label="iPhone 375x812 预览框">
          <div class="screen">
            <iframe id="preview" title="预览" sandbox="allow-scripts allow-forms allow-same-origin allow-popups"></iframe>
            <div class="placeholder" id="placeholder">
              <strong>375 × 812 预览框</strong>
              <span>在左侧选择页面</span>
            </div>
          </div>
        </div>
        <div class="page-info" id="pageInfo" style="display:none">
          <div class="page-info-header">
            <div class="page-info-title" id="pageInfoTitle"></div>
            <button class="refresh-btn" id="refreshBtn" title="刷新当前页面">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
              </svg>
            </button>
          </div>
          <div class="page-info-desc" id="pageInfoDesc"></div>
        </div>
      </div>
    </main>
  </div>

<script>
  // 目录结构。url 为空表示暂未配置链接（点击不切换）。
  const BASE = 'https://fish4.framer.website';
  const navData = [
    { type: 'page', label: 'Home', icon: 'home', url: BASE + '/', desc: `可以从这里直接开始，也可以点击左侧访问对应页面查看流程\n遇到页面卡顿，可以点击页面名称边上的刷新按钮` },
    { type: 'page', label: '/登录视频', url: BASE + '/登录视频', desc: `用户登录引导视频页面演示，可以点击跳过\n- 首次加载可能比较慢\n- 首先是品牌宣传页面，传递超级符号\n- 首次登录会进入与Agent的对话，进入人格化设置，与用户建立关系\n- 视频最后会落到新用户引导页面` },
    { type: 'page', label: '/首页', url: BASE + '/首页', desc: `主页面，展示用户核心功能入口。\n大卡片手机上应该是拖拽操作，目前用点击后面一张卡片来模拟了拖拽效果` },
    { type: 'folder', label: '/查保单', children: [
      { type: 'page', label: '/查收保单', url: BASE + '/查保单/查收保单', desc: `用户查收新保单的页面。` },
      { type: 'page', label: '/首页-查保单-首次', url: BASE + '/查保单/首页-查保单-首次', desc: `首次查保单的引导流程。` },
      { type: 'page', label: '/保障手册', url: BASE + '/查保单/保障手册', desc: `保障内容说明与条款解读。` },
      { type: 'page', label: '/保单详情', url: BASE + '/查保单/保单详情', desc: `单张保单的详细信息页。` },
    ]},
    { type: 'folder', label: '/新用户', children: [
      { type: 'page', label: '/新手引导', url: BASE + '/新用户/新手引导', desc: `新用户首次使用的引导流程。` },
      { type: 'page', label: '/首页-新用户', url: BASE + '/新用户/首页-新用户', desc: `针对新用户的定制首页。` },
    ]},
    { type: 'folder', label: '/探索发现', children: [
      { type: 'page', label: '/发现频道', url: BASE + '/探索发现/发现频道', desc: `内容发现与推荐频道页。` },
      { type: 'page', label: '/会话列表', url: BASE + '/探索发现/会话列表', desc: `AI 对话记录列表。` },
    ]},
    { type: 'folder', label: '/保险', children: [
      { type: 'page', label: '/保险频道', url: BASE + '/保险/保险频道', desc: `保险产品浏览与分类频道。` },
      { type: 'page', label: '/产品解读', url: BASE + '/保险/产品解读', desc: `保险产品详细解读页面。` },
    ]},
    { type: 'folder', label: '/我的', children: [
      { type: 'page', label: '/我的频道', url: BASE + '/我的/我的频道', desc: `个人中心与账户管理。` },
      { type: 'page', label: '/家庭保障分析', url: BASE + '/我的/家庭保障分析', desc: `家庭成员保障情况分析报告。` },
    ]},
  ];

  const ICONS = {
    home: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>',
    page: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg>',
    folder: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>',
    caret: '<svg viewBox="0 0 24 24" width="10" height="10" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>',
  };

  const navEl = document.getElementById('nav');
  const preview = document.getElementById('preview');
  const placeholder = document.getElementById('placeholder');
  const pageInfo = document.getElementById('pageInfo');
  const pageInfoTitle = document.getElementById('pageInfoTitle');
  const pageInfoDesc = document.getElementById('pageInfoDesc');
  const refreshBtn = document.getElementById('refreshBtn');
  let activeEl = null;

  refreshBtn.addEventListener('click', () => {
    if (!preview.src) return;
    refreshBtn.classList.add('spinning');
    preview.src = preview.src;
    setTimeout(() => refreshBtn.classList.remove('spinning'), 500);
  });

  function buildNav(items, parent) {
    items.forEach(item => {
      const li = document.createElement('li');
      const row = document.createElement('div');
      row.className = 'nav-item';
      if (!item.url && item.type === 'page') row.classList.add('disabled');

      if (item.type === 'folder') {
        row.classList.add('folder-row');
        row.innerHTML = `<span class="caret">${ICONS.caret}</span><span class="label">${item.label}</span>`;
        li.appendChild(row);
        const childUl = document.createElement('ul');
        childUl.className = 'nav-children';
        buildNav(item.children || [], childUl);
        li.appendChild(childUl);
        row.addEventListener('click', () => row.classList.toggle('collapsed'));
      } else {
        const icon = item.icon === 'home' ? ICONS.home : ICONS.page;
        row.innerHTML = `<span class="icon">${icon}</span><span class="label">${item.label}</span>`;
        li.appendChild(row);
        row.addEventListener('click', () => {
          if (!item.url) return;
          loadUrl(item.url);
          if (activeEl) activeEl.classList.remove('active');
          row.classList.add('active');
          activeEl = row;
          pageInfoTitle.textContent = item.label;
          pageInfoDesc.innerHTML = item.desc ? marked.parse(item.desc) : '';
          pageInfo.style.display = 'flex';
        });
      }
      parent.appendChild(li);
    });
  }

  function normalizeUrl(url) {
    if (!url) return '';
    if (/^(https?:)?\/\//i.test(url) || url.startsWith('./') || url.startsWith('/') || url.startsWith('data:')) return url;
    return 'https://' + url;
  }

  function loadUrl(url) {
    const final = normalizeUrl(url);
    if (!final) return;
    preview.src = final;
    placeholder.style.display = 'none';
    try {
      const u = new URL(final, window.location.href);
      history.replaceState(null, '', '?url=' + encodeURIComponent(u.href));
    } catch (e) {}
  }

  function flatItems(items) {
    return items.flatMap(i => i.type === 'folder' ? flatItems(i.children || []) : [i]);
  }

  buildNav(navData, navEl);

  const params = new URLSearchParams(window.location.search);
  const initial = params.get('url');
  if (initial) {
    loadUrl(initial);
    const matched = flatItems(navData).find(i => normalizeUrl(i.url) === normalizeUrl(initial));
    if (matched) {
      const allRows = navEl.querySelectorAll('.nav-item:not(.folder-row)');
      allRows.forEach(row => {
        if (row.querySelector('.label')?.textContent === matched.label) {
          row.classList.add('active');
          activeEl = row;
          pageInfoTitle.textContent = matched.label;
          pageInfoDesc.innerHTML = matched.desc ? marked.parse(matched.desc) : '';
          pageInfo.style.display = 'flex';
        }
      });
    }
  }
</script>
</body>
</html>
