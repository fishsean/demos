<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>iPhone 预览框架 · 375 × 812</title>
<style>
  :root {
    --bg: #f4f5f7;
    --frame-bg: #000;
    --shadow: 0 30px 80px rgba(0, 0, 0, 0.18), 0 8px 24px rgba(0, 0, 0, 0.08);
    --accent: #007aff;
    --sidebar-bg: #0f0f10;
    --sidebar-fg: #e5e5e7;
    --sidebar-muted: #8e8e93;
    --sidebar-hover: #1c1c1e;
    --sidebar-active: #2c2c2e;
    --sidebar-border: #1f1f22;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: #1d1d1f;
  }

  .layout {
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--sidebar-bg);
    color: var(--sidebar-fg);
    border-right: 1px solid var(--sidebar-border);
    padding: 16px 8px;
    overflow-y: auto;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px 12px;
    color: var(--sidebar-fg);
    font-size: 14px;
    font-weight: 600;
  }

  .sidebar-header .add {
    color: var(--sidebar-muted);
    font-size: 18px;
    cursor: pointer;
    user-select: none;
  }

  .nav { list-style: none; padding: 0; margin: 0; }
  .nav li { margin: 1px 0; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 8px;
    color: var(--sidebar-fg);
    font-size: 14px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s ease;
    line-height: 1.2;
  }

  .nav-item.folder-row {
    color: var(--sidebar-muted);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding-top: 14px;
  }

  .nav-item:hover { background: var(--sidebar-hover); }
  .nav-item.folder-row:hover { background: transparent; }

  .nav-item.active {
    background: var(--accent);
    color: #fff;
  }
  .nav-item.active .icon,
  .nav-item.active .caret { color: rgba(255,255,255,0.7); }

  .nav-item.disabled { color: var(--sidebar-muted); cursor: not-allowed; }
  .nav-item.disabled:hover { background: transparent; }

  .nav-item .icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--sidebar-muted);
  }

  .nav-item .caret {
    width: 12px;
    height: 12px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--sidebar-muted);
    transition: transform 0.15s ease;
  }

  .nav-item.collapsed .caret { transform: rotate(-90deg); }

  .nav-children {
    list-style: none;
    margin: 0;
    padding: 0 0 0 24px;
    overflow: hidden;
  }

  .nav-item.collapsed + .nav-children { display: none; }

  /* Main */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
    gap: 24px;
    min-width: 0;
  }


  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .device {
    background: var(--frame-bg);
    border-radius: 48px;
    padding: 12px;
    box-shadow: var(--shadow);
    position: relative;
    flex-shrink: 0;
  }

  .screen {
    width: 375px;
    height: 812px;
    border-radius: 36px;
    overflow: hidden;
    background: #fff;
    position: relative;
  }

  .screen iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #8e8e93;
    font-size: 14px;
    text-align: center;
    padding: 24px;
  }

  .placeholder strong { color: #1d1d1f; font-size: 16px; }

  @media (max-width: 1080px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; height: auto; position: static; }
  }
</style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span>Pages</span>
        <span class="add" title="新增">+</span>
      </div>
      <ul class="nav" id="nav"></ul>
    </aside>

    <main class="main">
      <div class="stage">
        <div class="device" aria-label="iPhone 375x812 预览框">
          <div class="screen">
            <iframe id="preview" title="预览" sandbox="allow-scripts allow-forms allow-same-origin allow-popups"></iframe>
            <div class="placeholder" id="placeholder">
              <strong>375 × 812 预览框</strong>
              <span>在左侧选择页面，或在上方输入链接</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

<script>
  // 目录结构。url 为空表示暂未配置链接（点击不切换）。
  const BASE = 'https://colorful-coconut-513541.framer.app';
  const navData = [
    { type: 'page', label: 'Home', icon: 'home', url: BASE + '/首页' },
    { type: 'page', label: '/登录视频', url: BASE + '/登录视频' },
    { type: 'page', label: '/首页', url: BASE + '/首页' },
    { type: 'folder', label: '/查保单', children: [
      { type: 'page', label: '/查收保单', url: BASE + '/查保单/查收保单' },
      { type: 'page', label: '/首页-查保单-首次', url: BASE + '/查保单/首页-查保单-首次' },
      { type: 'page', label: '/保障手册', url: BASE + '/查保单/保障手册' },
      { type: 'page', label: '/保单详情', url: BASE + '/查保单/保单详情' },
    ]},
    { type: 'folder', label: '/新用户', children: [
      { type: 'page', label: '/新手引导', url: BASE + '/新用户/新手引导' },
      { type: 'page', label: '/首页-新用户', url: BASE + '/新用户/首页-新用户' },
    ]},
    { type: 'folder', label: '/探索发现', children: [
      { type: 'page', label: '/发现频道', url: BASE + '/探索发现/发现频道' },
      { type: 'page', label: '/会话列表', url: BASE + '/探索发现/会话列表' },
    ]},
    { type: 'folder', label: '/保险', children: [
      { type: 'page', label: '/保险频道', url: BASE + '/保险/保险频道' },
      { type: 'page', label: '/产品解读', url: BASE + '/保险/产品解读' },
    ]},
    { type: 'folder', label: '/我的', children: [
      { type: 'page', label: '/我的频道', url: BASE + '/我的/我的频道' },
      { type: 'page', label: '/家庭保障分析', url: BASE + '/我的/家庭保障分析' },
    ]},
  ];

  const ICONS = {
    home: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>',
    page: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg>',
    folder: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>',
    caret: '<svg viewBox="0 0 24 24" width="10" height="10" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>',
  };

  const navEl = document.getElementById('nav');
  const preview = document.getElementById('preview');
  const placeholder = document.getElementById('placeholder');
  let activeEl = null;

  function buildNav(items, parent) {
    items.forEach(item => {
      const li = document.createElement('li');
      const row = document.createElement('div');
      row.className = 'nav-item';
      if (!item.url && item.type === 'page') row.classList.add('disabled');

      if (item.type === 'folder') {
        row.classList.add('folder-row');
        row.innerHTML = `<span class="caret">${ICONS.caret}</span><span class="label">${item.label}</span>`;
        li.appendChild(row);
        const childUl = document.createElement('ul');
        childUl.className = 'nav-children';
        buildNav(item.children || [], childUl);
        li.appendChild(childUl);
        row.addEventListener('click', () => row.classList.toggle('collapsed'));
      } else {
        const icon = item.icon === 'home' ? ICONS.home : ICONS.page;
        row.innerHTML = `<span class="icon">${icon}</span><span class="label">${item.label}</span>`;
        li.appendChild(row);
        row.addEventListener('click', () => {
          if (!item.url) return;
          loadUrl(item.url);
          if (activeEl) activeEl.classList.remove('active');
          row.classList.add('active');
          activeEl = row;
        });
      }
      parent.appendChild(li);
    });
  }

  function normalizeUrl(url) {
    if (!url) return '';
    if (/^(https?:)?\/\//i.test(url) || url.startsWith('./') || url.startsWith('/') || url.startsWith('data:')) return url;
    return 'https://' + url;
  }

  function loadUrl(url) {
    const final = normalizeUrl(url);
    if (!final) return;
    preview.src = final;
    placeholder.style.display = 'none';
    try {
      const u = new URL(final, window.location.href);
      history.replaceState(null, '', '?url=' + encodeURIComponent(u.href));
    } catch (e) {}
  }

  buildNav(navData, navEl);

  const params = new URLSearchParams(window.location.search);
  const initial = params.get('url');
  if (initial) { loadUrl(initial); }
</script>
</body>
</html>
